services:
  - type: web
    name: awqaf-damas
    env: node
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SECRET
        generateValue: true
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: GMAIL_APPS_SCRIPT_URL
        sync: false
      - key: GMAIL_WEBHOOK_SECRET
        sync: false
      - key: BOOTSTRAP_MANAGER_EMAIL
        sync: false
      - key: MAIL_FROM_NAME
        value: مديرية أوقاف دمشق
      - key: ENABLE_DEMO_LOGIN
        value: "true"

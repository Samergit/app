<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0B6E4F">
<title>أوقاف دمشق — تبادل مستلزمات المساجد</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #0B6E4F;
    --primary-dark: #08503A;
    --primary-light: #E7F2EE;
    --gold: #C9A227;
    --gold-light: #F7EFD6;
    --bg-warm: #FAF8F5;
    --card-bg: #FFFFFF;
    --text-main: #112A20;
    --text-muted: #6B7C75;
    --border-color: #E6EAE7;
    --red: #C0392B;
    --red-light: #FBEBE9;
    --amber: #B97A0A;
    --amber-l: #FBF1DD;
    --blue: #1F6FB2;
    --blue-l: #E7F1F9;
    --radius: 16px;
  }
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    font-family: 'Tajawal', sans-serif;
  }
  body {
    background-color: #ECE9E2;
    background-image: radial-gradient(circle, #F6F4EE 10%, #ECE9E2 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px 0;
    color: var(--text-main);
  }
  #app {
    max-width: 480px;
    width: 100%;
    height: 860px;
    max-height: 96vh;
    border-radius: 40px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.18), 0 0 0 10px #333;
    overflow: hidden;
    position: relative;
    border: 4px solid #111;
    display: flex;
    flex-direction: column;
    background: var(--bg-warm);
  }
  @media (max-width: 500px) {
    body {
      padding: 0;
      background: var(--bg-warm);
    }
    #app {
      max-width: 100%;
      height: 100vh;
      max-height: 100vh;
      border-radius: 0;
      border: 0;
      box-shadow: none;
    }
  }
  .hide { display: none !important; }

  /* header */
  .head {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff;
    padding: 16px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 20;
    box-shadow: 0 2px 10px rgba(8, 80, 58, 0.15);
  }
  .head .row {
    display: flex;
    align-items: center;
    gap: 11px;
  }
  .logo {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: rgba(255,255,255,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .logo svg {
    width: 26px;
    height: 26px;
  }
  .head .ttl {
    font-size: 15px;
    font-weight: 800;
    line-height: 1.3;
  }
  .head .sub {
    font-size: 11px;
    opacity: 0.85;
  }
  .head .out {
    margin-inline-start: auto;
    background: rgba(255,255,255,0.16);
    border: 0;
    color: #fff;
    font-family: inherit;
    font-weight: 700;
    font-size: 11.5px;
    padding: 8px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
  }
  .head .out:hover {
    background: rgba(255,255,255,0.24);
  }
  .who {
    margin-top: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }
  .who .pill {
    margin-inline-start: auto;
    background: var(--gold);
    color: #3a2e05;
    font-weight: 800;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
  }

  .screen {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 86px;
    background: var(--bg-warm);
  }
  .sec-h {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 4px 2px 12px;
  }
  .sec-h h2 {
    font-size: 15px;
    font-weight: 800;
    color: var(--text-main);
  }
  .sec-h .cnt {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 700;
  }

  /* cards & list grid */
  .items-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .compact-card {
    background: #fff;
    border: 1px solid var(--border-color);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 2px 8px rgba(11,110,79,0.03);
  }
  .compact-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(11,110,79,0.06);
  }
  .compact-card .c-ph {
    height: 100px;
    background: var(--primary-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 38px;
    background-size: cover;
    background-position: center;
  }
  .compact-card .c-bd {
    padding: 10px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .compact-card .c-bd h4 {
    font-size: 13px;
    font-weight: 800;
    margin-bottom: 4px;
    color: var(--text-main);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .compact-card .c-mosque {
    font-size: 11px;
    color: var(--primary-dark);
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .compact-card .c-time {
    font-size: 10.5px;
    color: var(--text-muted);
  }

  .btn {
    border: 0;
    font-family: inherit;
    font-weight: 800;
    font-size: 13px;
    padding: 12px;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: 0.15s;
  }
  .btn:active { transform: scale(0.97); }
  .btn[disabled] { opacity: 0.55; cursor: not-allowed; }
  
  .btn-pri { background: var(--primary); color: #fff; }
  .btn-pri:hover { background: var(--primary-dark); }
  .btn-ghost { background: var(--primary-light); color: var(--primary-dark); }
  .btn-gold { background: var(--gold); color: #3a2e05; }
  .btn-red { background: var(--red-light); color: var(--red); }
  .btn-grey { background: #EEF2F0; color: var(--text-muted); }

  .st {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10.5px;
    font-weight: 800;
    padding: 4px 10px;
    border-radius: 20px;
  }
  .st-av { background: var(--primary-light); color: var(--primary-dark); }
  .st-wait { background: var(--amber-l); color: var(--amber); }
  .st-ok { background: var(--blue-l); color: var(--blue); }
  .st-no { background: var(--red-l); color: var(--red); }
  .st-done { background: #ECECEC; color: #555; }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .stat {
    background: #fff;
    border: 1px solid var(--border-color);
    border-radius: 15px;
    padding: 13px;
  }
  .stat .n {
    font-size: 23px;
    font-weight: 800;
    color: var(--primary-dark);
  }
  .stat .l {
    font-size: 11.5px;
    color: var(--text-muted);
    font-weight: 600;
    margin-top: 2px;
  }
  .stat.gold .n { color: var(--gold); }
  .stat.amber .n { color: var(--amber); }
  .stat.blue .n { color: var(--blue); }

  .op {
    background: #fff;
    border: 1px solid var(--border-color);
    border-radius: 15px;
    padding: 12px;
    margin-bottom: 11px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.01);
  }
  .op .top {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 9px;
  }
  .op .ic {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--primary-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    overflow: hidden;
    background-size: cover;
    background-position: center;
  }
  .op .ti h3 { font-size: 13px; font-weight: 800; }
  .op .flow {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
  }
  .op .flow b { color: var(--text-main); font-weight: 700; }
  .arrow { color: var(--gold); font-weight: 800; }
  .op .note {
    font-size: 11.5px;
    background: var(--bg-warm);
    border-radius: 9px;
    padding: 7px 9px;
    margin-top: 8px;
    color: #52635c;
    line-height: 1.5;
  }
  .op .when { font-size: 10.5px; color: var(--text-muted); margin-top: 7px; }

  /* Premium mockup banner */
  .home-banner {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border-radius: var(--radius);
    padding: 18px 20px;
    color: #fff;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(11, 110, 79, 0.15);
  }
  .home-banner::after {
    content: '';
    position: absolute;
    top: -40px;
    right: -40px;
    width: 120px;
    height: 120px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 50%;
  }
  .banner-text h3 {
    font-size: 16px;
    font-weight: 800;
    margin-bottom: 4px;
  }
  .banner-text p {
    font-size: 11px;
    opacity: 0.9;
  }
  .banner-icon {
    font-size: 38px;
    opacity: 0.85;
    z-index: 1;
  }

  /* search bar */
  .search-wrapper {
    position: relative;
    margin-bottom: 15px;
  }
  .search-input {
    width: 100%;
    padding: 12px 40px 12px 16px;
    border-radius: 12px;
    border: 1.5px solid var(--border-color);
    background: #fff;
    font-family: inherit;
    font-size: 13px;
    outline: none;
    transition: 0.2s;
  }
  .search-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(11, 110, 79, 0.1);
  }
  .search-icon {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
    font-size: 15px;
  }

  /* bottom nav with floating plus button */
  .nav {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 72px;
    background: #ffffff;
    border-top: 1px solid var(--border-color);
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 25;
    padding: 0 8px;
    box-shadow: 0 -4px 15px rgba(0,0,0,0.03);
  }
  .nav button {
    flex: 1;
    height: 100%;
    border: 0;
    background: transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.15s;
  }
  .nav button.active {
    color: var(--primary);
  }
  .nav button svg {
    width: 22px;
    height: 22px;
    stroke-width: 2.2px;
  }
  .nav-add-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: var(--primary);
    color: #fff;
    border: 4px solid #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(11, 110, 79, 0.3);
    margin-top: -24px;
    transition: 0.2s;
  }
  .nav-add-btn:active {
    transform: scale(0.92);
  }

  /* sheet */
  .ov {
    position: absolute;
    inset: 0;
    background: rgba(12,30,24,0.55);
    z-index: 40;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .ov.show { display: flex; }
  .sheet {
    background: #fff;
    width: 100%;
    border-radius: 24px 24px 0 0;
    padding: 8px 18px 24px;
    max-height: 92%;
    overflow-y: auto;
  }
  .grip {
    width: 42px;
    height: 5px;
    background: var(--border-color);
    border-radius: 5px;
    margin: 6px auto 14px;
  }
  .sheet h2 { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
  .sheet .lead { font-size: 12.5px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.6; }
  .field { margin-bottom: 13px; }
  .field label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 6px; }
  .field input, .field select, .field textarea {
    width: 100%;
    font-family: inherit;
    font-size: 14px;
    padding: 12px;
    border: 1.5px solid var(--border-color);
    border-radius: 12px;
    background: var(--bg-warm);
    color: var(--text-main);
  }
  .field textarea { resize: none; height: 74px; }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none;
    border-color: var(--primary);
  }
  .photobox {
    border: 2px dashed var(--primary);
    background: var(--primary-light);
    border-radius: 14px;
    padding: 20px;
    text-align: center;
    color: var(--primary-dark);
    font-weight: 700;
    font-size: 12.5px;
    cursor: pointer;
    background-size: cover;
    background-position: center;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .photobox .em { font-size: 32px; margin-bottom: 6px; }
  .chips { display: flex; gap: 7px; flex-wrap: wrap; }
  .chip {
    font-size: 12px;
    font-weight: 700;
    padding: 8px 13px;
    border-radius: 20px;
    border: 1.5px solid var(--border-color);
    background: #fff;
    cursor: pointer;
    color: var(--text-muted);
  }
  .chip.on {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }

  .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); }
  .empty .em { font-size: 42px; opacity: 0.6; }
  .empty b { display: block; margin: 10px 0 4px; color: var(--text-main); }
  .empty p { font-size: 12px; }
  
  .toast {
    position: absolute;
    bottom: 84px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--primary-dark);
    color: #fff;
    font-size: 12.5px;
    font-weight: 700;
    padding: 12px 18px;
    border-radius: 13px;
    z-index: 60;
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
    box-shadow: 0 10px 24px rgba(0,0,0,0.2);
    max-width: 88%;
    text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* login screens */
  .login {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 30px 24px;
    background: linear-gradient(160deg, var(--primary-dark), var(--primary) 70%, #0a6045);
    overflow-y: auto;
  }
  .login .brand { text-align: center; color: #fff; }
  .login .brand h1 { font-size: 21px; font-weight: 800; }
  .login .brand p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
  .login .box { background: #fff; border-radius: 20px; padding: 22px; width: 100%; }
  .login .box h2 { font-size: 16px; font-weight: 800; margin-bottom: 4px; color: var(--text-main); }
  .login .box p { font-size: 12.5px; color: var(--text-muted); margin-bottom: 16px; }
  .login .demo {
    margin-top: 16px;
    background: var(--gold-light);
    border-radius: 12px;
    padding: 12px;
    font-size: 11.5px;
    color: #6a5410;
    line-height: 1.7;
  }
  .login .demo b { color: #3a2e05; }
  .login .demo-actions { display: grid; gap: 7px; margin-top: 9px; }
  .login .demo-role {
    width: 100%;
    border: 1px solid rgba(106,84,16,0.18);
    background: #fff;
    color: #4e410e;
    padding: 9px 10px;
    border-radius: 9px;
    font-family: inherit;
    font-size: 11.5px;
    font-weight: 800;
    cursor: pointer;
    text-align: right;
  }
  .login .demo-role:active { transform: scale(0.98); }
  .login .demo-role[disabled] { opacity: 0.55; cursor: wait; }
  .login .demo-note { display: block; margin-top: 8px; font-size: 10.5px; line-height: 1.5; }
</style>
</head>
<body>
<div id="app">
  <!-- شاشة الدخول والترحيب -->
  <div class="login" id="login">
    <!-- Splash Screen (الشاشة الترحيبية من الصورة) -->
    <div id="splashScreen" style="display:flex; flex-direction:column; justify-content:space-between; height:100%; width:100%;">
      <div class="brand" style="margin-top:40px">
        <div class="logo" style="border:1.5px solid var(--gold); display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.08); width:90px; height:90px; border-radius:30px; margin: 0 auto 16px">
          <svg
   width="637.98"
   height="478.74"
   viewBox="0 0 212.66 159.58"
   version="1.1"
   id="svg3"
   sodipodi:docname="Emblem_of_Syria_(2025–present) (4).svg"
   inkscape:version="1.4.2 (ebf0e94, 2025-05-08)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <defs
     id="defs3" />
  <sodipodi:namedview
     id="namedview3"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="0.8720809"
     inkscape:cx="272.91046"
     inkscape:cy="209.26958"
     inkscape:window-width="1920"
     inkscape:window-height="1094"
     inkscape:window-x="-11"
     inkscape:window-y="-11"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg3" />

<div class="ov" id="ov" onclick="if(event.target===this)closeSheet()"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
const API = '';
let token = localStorage.getItem('awqaf_token') || null;
let user  = JSON.parse(localStorage.getItem('awqaf_user') || 'null');
let tab='browse', addPhoto='', addCat=null, loginPhone='';
let dbItems = [];
let searchQuery = '';
let selectedCategory = null;

const EMOJI={'تكييف وتدفئة':'❄️','فرش وسجاد':'🟩','أثاث':'🪑','صوتيات':'🔊','إنارة':'💡','أخرى':'📦'};
const CATS=Object.keys(EMOJI);
const ST={available:{c:'st-av',t:'متاح للطلب'},pending:{c:'st-wait',t:'بانتظار موافقة الوزارة'},
  approved:{c:'st-ok',t:'موافَق — بانتظار التسليم'},rejected:{c:'st-no',t:'مرفوض'},delivered:{c:'st-done',t:'تم التسليم'}};
const emo=c=>EMOJI[c]||'📦';
function ago(ts){const d=Math.floor((Date.now()-ts)/86400000);return d<=0?'اليوم':d===1?'أمس':`قبل ${d} أيام`}
function stBadge(s){return `<span class="st ${ST[s].c}">${ST[s].t}</span>`}

let favorites = JSON.parse(localStorage.getItem('awqaf_favorites') || '[]');

/* ---- API helper ---- */
async function api(path,opt={}){
  const h={'Content-Type':'application/json'};
  if(token)h['Authorization']='Bearer '+token;
  const r=await fetch(API+path,{...opt,headers:h});
  const data=await r.json().catch(()=>({}));
  if(!r.ok){
    if(r.status===401&&token){
      token=null;user=null;
      localStorage.removeItem('awqaf_token');localStorage.removeItem('awqaf_user');
      setTimeout(()=>location.reload(),80);
    }
    throw new Error(data.error||'حدث خطأ');
  }
  return data;
}

/* ---- الدخول ---- */
function backToPhone(){document.getElementById('step2').classList.add('hide');document.getElementById('step1').classList.remove('hide')}
async function demoLogin(role){
  const buttons=[...document.querySelectorAll('[data-demo-role]')];
  buttons.forEach(button=>button.disabled=true);
  try{
    const r=await api('/api/auth/demo-login',{method:'POST',body:JSON.stringify({role})});
    token=r.token;user=r.user;
    localStorage.setItem('awqaf_token',token);localStorage.setItem('awqaf_user',JSON.stringify(user));
    enterApp();
  }catch(e){
    toast(e.message);
  }finally{
    buttons.forEach(button=>button.disabled=false);
  }
}
async function requestOtp(){
  const phone=document.getElementById('phone').value.trim();
  if(!phone)return toast('أدخل البريد الإلكتروني أو رقم جوالك');
  try{
    const r=await api('/api/auth/request-otp',{method:'POST',body:JSON.stringify({identifier:phone})});
    loginPhone=phone;
    document.getElementById('phoneEcho').textContent=r.delivery_hint||'بريدك الإلكتروني المسجّل';
    document.getElementById('step1').classList.add('hide');
    document.getElementById('step2').classList.remove('hide');
    if(r.dev_code){document.getElementById('code').value=r.dev_code;toast('رمز التحقق (تجريبي): '+r.dev_code)}
    else toast(r.message||'تم إرسال رمز التحقق إلى بريدك الإلكتروني');
  }catch(e){toast(e.message)}
}
async function verifyOtp(){
  const code=document.getElementById('code').value.trim();
  try{
    const r=await api('/api/auth/verify-otp',{method:'POST',body:JSON.stringify({identifier:loginPhone,code})});
    token=r.token;user=r.user;
    localStorage.setItem('awqaf_token',token);localStorage.setItem('awqaf_user',JSON.stringify(user));
    enterApp();
  }catch(e){toast(e.message)}
}
function logout(){token=null;user=null;localStorage.removeItem('awqaf_token');localStorage.removeItem('awqaf_user');location.reload()}

function enterApp(){
  document.getElementById('login').classList.add('hide');
  document.getElementById('main').classList.remove('hide');
  if (user) {
    if (user.role === 'guest') {
      tab = 'browse';
    } else {
      tab = user.role==='imam'?'browse':user.role==='ministry'?'queue':'dash';
    }
  } else {
    tab = 'browse';
  }
  renderWho();renderNav();render();
}

function showLoginInput() {
  document.getElementById('splashScreen').classList.add('hide');
  document.getElementById('loginForm').classList.remove('hide');
}
function showSplash() {
  document.getElementById('loginForm').classList.add('hide');
  document.getElementById('splashScreen').classList.remove('hide');
}
function showRegisterNotice() {
  document.getElementById('ov').classList.add('show');
  document.getElementById('sheet').innerHTML = `
    <div class="grip"></div>
    <h2 style="color:var(--primary); font-weight: 800">إنشاء حساب جديد</h2>
    <p class="lead" style="line-height:1.8; font-size:13.5px; margin-bottom:20px">
      أهلاً بك في نظام تبادل مستلزمات المساجد التابع لمديرية أوقاف دمشق.
      <br><br>
      <b>تنبيه هام:</b>
      ينشئ موظف الوزارة حسابات قيمي المساجد فقط، بينما ينشئ المدير العام حسابات الموظفين.
      <br><br>
      إذا كنت قيّماً على مسجد ولم يتم تسجيلك بعد، يرجى مراجعة شعبة شؤون المساجد بالمديرية لتسجيل اسمك ورقم جوالك والمسجد التابع لك لتتمكن من الدخول الفوري عبر رقم جواله أو بريده.
    </p>
    <button class="btn btn-pri" style="width:100%" onclick="closeSheet()">حسناً، فهمت</button>
  `;
}
function guestMode() {
  user = { role: 'guest', fullName: 'زائر', mosque: null };
  token = null;
  enterApp();
}

/* ---- الرأس والتنقل ---- */
function renderWho(){
  if (!user || user.role === 'guest') {
    document.getElementById('who').innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg> <b>زائر كريم</b><span class="pill" style="background:rgba(255,255,255,0.2);color:#fff">تصفح فقط</span>`;
    return;
  }
  const roleLbl={imam:'قيّم مسجد',ministry:'موظف الوزارة',manager:'إشراف'}[user.role];
  const sub=user.mosque?(' · '+user.mosque):'';
  document.getElementById('who').innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg> <b>${user.fullName}</b>${sub}<span class="pill">${roleLbl}</span>`;
}

function renderNav(){
  const nav=document.getElementById('nav');
  const I={
    browse:'<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>',
    mine:'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>',
    queue:'<path d="M3 6h18M3 12h18M3 18h12"/>',
    log:'<path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>',
    dash:'<path d="M3 13h8V3H3zM13 21h8V8h-8z"/>',
    mosques:'<path d="M3 21h18M5 21V10l7-5 7 5v11"/>',
    favorites:'<path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>',
    more:'<path d="M4 6h16M4 12h16M4 18h16"/>',
    accounts:'<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>'
  };
  const mk=(id,l)=>`<button class="${tab===id?'active':''}" onclick="go('${id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${I[id]}</svg>${l}</button>`;
  
  if (!user || user.role === 'guest') {
    nav.innerHTML = mk('browse', 'الرئيسية') + mk('favorites', 'المفضلة') + `<button onclick="toast('يجب تسجيل الدخول كقيم مسجد لرفع الأغراض')"><div class="nav-add-btn" style="background:#8fae9f; cursor:not-allowed">+</div></button>` + mk('more', 'المزيد');
    document.getElementById('fab').classList.add('hide');
    return;
  }
  
  if(user.role==='imam') {
    nav.innerHTML=mk('browse','الرئيسية') + mk('favorites','المفضلة') + `<button onclick="openAdd()"><div class="nav-add-btn">+</div></button>` + mk('mine','أغراضي') + mk('more','المزيد');
    document.getElementById('fab').classList.add('hide');
  }
  if(user.role==='ministry') {
    nav.innerHTML=mk('queue','الموافقات')+mk('log','السجل')+mk('accounts','الحسابات');
    document.getElementById('fab').classList.add('hide');
  }
  if(user.role==='manager') {
    nav.innerHTML=mk('dash','اللوحة')+mk('log','العمليات')+mk('mosques','المساجد')+mk('accounts','الحسابات');
    document.getElementById('fab').classList.add('hide');
  }
}
function go(t){tab=t;renderNav();render()}

/* ---- العرض ---- */
const screen=()=>document.getElementById('screen');
function loading(){screen().innerHTML='<div class="empty"><span class="em">⏳</span><b>جارٍ التحميل…</b></div>'}
async function render(){
  loading();
  try{
    if (tab === 'browse') await renderBrowse();
    else if (tab === 'favorites') await renderFavorites();
    else if (tab === 'mine') await renderMine();
    else if (tab === 'more') await renderMore();
    else if (tab === 'queue') await ministry();
    else if (tab === 'dash') await manager();
    else if (tab === 'log') await logScreen();
    else if (tab === 'mosques') await manager();
    else if (tab === 'accounts') await accountsScreen();
    else throw new Error('الصفحة المطلوبة غير متاحة');
  }catch(e){screen().innerHTML=`<div class="empty"><span class="em">⚠️</span><b>${e.message}</b></div>`}
  screen().scrollTop=0;
}
function emptyBox(em,t,s){return `<div class="empty"><span class="em">${em}</span><b>${t}</b><p>${s||''}</p></div>`}
function phStyle(it){return it.photo?`style="background-image:url('${it.photo}')"`:''}

function onSearchChange(val) {
  searchQuery = val.toLowerCase().trim();
  render();
}

function selectCategory(cat) {
  if (selectedCategory === cat) {
    selectedCategory = null;
  } else {
    selectedCategory = cat;
  }
  render();
}

/* تصفح الأغراض */
async function renderBrowse() {
  const {data}=await api('/api/items?scope=browse');
  dbItems = data;
  
  let filtered = data;
  if (selectedCategory) {
    filtered = filtered.filter(i => i.category === selectedCategory);
  }
  if (searchQuery) {
    filtered = filtered.filter(i => i.name.toLowerCase().includes(searchQuery) || i.sourceMosque.name.toLowerCase().includes(searchQuery));
  }
  
  const bannerHtml = `
    <div class="home-banner">
      <div class="banner-text">
        <h3>من مسجد إلى مسجد</h3>
        <p>عطاء يبقى، وأجر لا ينقطع</p>
      </div>
      <div class="banner-icon">🕌</div>
    </div>
  `;
  
  const searchHtml = `
    <div class="search-wrapper">
      <input type="text" class="search-input" placeholder="البحث عن صنف أو مسجد..." value="${searchQuery}" oninput="onSearchChange(this.value)">
      <span class="search-icon">🔍</span>
    </div>
  `;
  
  const categoriesHtml = `
    <div style="margin-bottom: 15px;">
      <h3 style="font-size: 13.5px; font-weight: 800; margin-bottom: 8px;">الأصناف المتاحة</h3>
      <div style="display:flex; gap:8px; overflow-x:auto; padding-bottom:6px; scrollbar-width: none;">
        ${CATS.map(c => {
          const isSel = selectedCategory === c;
          return `<span class="chip ${isSel ? 'on' : ''}" onclick="selectCategory('${c}')" style="flex-shrink:0; margin:0; font-size:11.5px; padding:6px 12px">${emo(c)} ${c}</span>`;
        }).join('')}
      </div>
    </div>
  `;
  
  const listHtml = filtered.length 
    ? `<div class="items-grid">${filtered.map(compactItemCard).join('')}</div>`
    : emptyBox('📭', 'لا توجد أغراض مطابقة للبحث', 'تصفح الأصناف الأخرى أو عدل كلمات البحث');
    
  screen().innerHTML = bannerHtml + searchHtml + categoriesHtml + `<h3 style="font-size: 13.5px; font-weight: 800; margin-bottom: 10px;">أحدث الإضافات</h3>` + listHtml;
}

async function renderFavorites() {
  const {data} = await api('/api/items?scope=browse');
  const favItems = data.filter(i => favorites.includes(i.id));
  
  screen().innerHTML = `<div class="sec-h"><h2>الأصناف المفضلة</h2><span class="cnt">${favItems.length}</span></div>`
    + (favItems.length 
      ? `<div class="items-grid">${favItems.map(compactItemCard).join('')}</div>`
      : emptyBox('❤️', 'المفضلة فارغة', 'اضغط على تفاصيل الغرض واحفظه بالقلب ليظهر هنا'));
}

async function renderMine() {
  const {data}=await api('/api/items?scope=mine');
  dbItems = data;
  screen().innerHTML=`<div class="sec-h"><h2>أغراض مسجدي المرفوعة</h2><span class="cnt">${data.length}</span></div>`
    +(data.length?`<div class="items-grid">${data.map(compactItemCard).join('')}</div>`:emptyBox('📦','لم ترفع أي غرض بعد','اضغط على الزر الدائري في المنتصف لرفع غرض'));
}

function compactItemCard(i) {
  return `
    <div class="compact-card" onclick="openDetails(${i.id})">
      <div class="c-ph" ${phStyle(i)}>${i.photo ? '' : emo(i.category)}</div>
      <div class="c-bd">
        <h4>${i.name}</h4>
        <div class="c-mosque">🕌 ${i.sourceMosque.name}</div>

/* تفاصيل الصنف (الشاشة 4 في النموذج) */
function openDetails(itemId) {
  const item = dbItems.find(i => i.id === itemId);
  if (!item) return;
  
  const isFav = favorites.includes(itemId);
  const favText = isFav ? '❤️ إزالة من المفضلة' : '🤍 حفظ في المفضلة';
  
  let actionsHtml = '';
  // Owner actions
  if (user && user.role === 'imam' && item.sourceMosqueId === user.mosqueId) {
    if (item.status === 'available') {
      actionsHtml = `<button class="btn btn-red" style="width:100%" onclick="delItem(${item.id}); closeSheet();">سحب الإعلان</button>`;
    } else if (item.status === 'pending') {
      actionsHtml = `<button class="btn btn-grey" style="width:100%" disabled>بانتظار موافقة الوزارة</button>`;
    } else if (item.status === 'approved') {
      actionsHtml = `<button class="btn btn-gold" style="width:100%" onclick="deliver(${item.id}); closeSheet();">✅ تأكيد التسليم</button>`;
    }
  } 
  // Non-owner imam actions
  else if (user && user.role === 'imam' && item.status === 'available') {
    actionsHtml = `<button class="btn btn-pri" style="margin-bottom:8px; width:100%" onclick="reqItem(${item.id}); closeSheet();">🤲 طلب هذا الغرض</button>`;
  }
  // Ministry actions
  else if (user && user.role === 'ministry' && item.status === 'pending') {
    actionsHtml = `
      <div style="display:flex; gap:10px; margin-bottom:8px; width:100%">
        <button class="btn btn-pri" style="flex:1" onclick="decide(${item.id}, 'approve'); closeSheet();">✅ موافقة</button>
        <button class="btn btn-red" style="flex:1" onclick="openReject(${item.id})">✕ رفض</button>
      </div>
    `;
  }
  
  const contactButton = (user && user.role === 'imam' && item.sourceMosqueId !== user.mosqueId)
    ? `<button class="btn btn-ghost" style="margin-bottom:8px; border: 1.5px solid var(--primary); width:100%" onclick="simulateContact('${item.sourceMosque.name}')">📞 تواصل مع المسجد</button>`
    : '';

  document.getElementById('ov').classList.add('show');
  document.getElementById('sheet').innerHTML = `
    <div class="grip"></div>
    <div style="position:relative; border-radius:12px; overflow:hidden; height:180px; background:var(--primary-light); display:flex; align-items:center; justify-content:center; margin-bottom:15px; background-size:cover; background-position:center; ${item.photo ? `background-image:url('${item.photo}')` : ''}">
      ${item.photo ? '' : `<span style="font-size:72px">${emo(item.category)}</span>`}
      <span class="badge ${ST[item.status].c}" style="position:absolute; top:10px; right:10px; padding:4px 10px; border-radius:20px; font-weight:800; font-size:11px">${ST[item.status].t}</span>
    </div>
    <h2 style="font-size:18px; font-weight:800; margin-bottom:10px">${item.name}</h2>
    
    <div style="display:flex; flex-direction:column; gap:8px; margin-bottom:15px; border-bottom:1px solid var(--border-color); padding-bottom:15px;">
      <div style="display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-main)">
        <span>🕌</span> <span>${item.sourceMosque.name}</span>
      </div>
      <div style="display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-muted)">
        <span>🏷️</span> <span>الفئة: ${item.category} · الكمية: ${item.quantity}</span>
      </div>
      <div style="display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-muted)">
        <span>⏱️</span> <span>تمت الإضافة: ${ago(item.createdAt)}</span>
      </div>
    </div>
    
    <div style="margin-bottom:15px">
      <h4 style="font-size:12px; color:var(--text-muted); margin-bottom:6px">الوصف</h4>
      <p style="font-size:13px; line-height:1.6; color:#333">${item.description || 'لا يوجد وصف تفصيلي.'}</p>
    </div>

    <div style="margin-bottom:18px">
      <h4 style="font-size:12px; color:var(--text-muted); margin-bottom:6px">الموقع</h4>
      <p style="font-size:12.5px; color:#333">📍 دمشق - ${item.sourceMosque.area || 'وسط المدينة'}</p>
    </div>

    <div style="display:flex; flex-direction:column; gap:8px">
      ${actionsHtml}
      ${contactButton}
      <button class="btn btn-ghost" style="width:100%" onclick="toggleFav(${item.id})">${favText}</button>
    </div>
  `;
}

function toggleFav(id) {
  const index = favorites.indexOf(id);
  if (index > -1) {
    favorites.splice(index, 1);
    toast('تمت الإزالة من المفضلة');
  } else {
    favorites.push(id);
    toast('تمت الإضافة للمفضلة ✓');
  }
  localStorage.setItem('awqaf_favorites', JSON.stringify(favorites));
  openDetails(id);
  if (tab === 'favorites') render();
}

function simulateContact(mName) {
  toast(`جاري فتح محادثة مع قيم ${mName}...`);
  setTimeout(() => {
    closeSheet();
    go('more');

}

function toggleNewMosque(val) {
  const fields = document.getElementById('newMosqueFields');
  if (val === 'new') {
    fields.classList.remove('hide');
  } else {
    fields.classList.add('hide');
  }
}

async function saveAccount(role) {
  if (role === 'ministry' && (!user || user.role !== 'manager'))
    return toast('المدير العام فقط يمكنه إنشاء حساب موظف وزارة');

  const fullName = document.getElementById('accName').value.trim();
  const phone = document.getElementById('accPhone').value.trim();
  const email = document.getElementById('accEmail').value.trim();
  let mosqueId = '';
  let newMosque = null;
  
  if (role === 'imam') {
    const mSelect = document.getElementById('accMosqueId').value;
    if (mSelect === 'new') {
      const mName = document.getElementById('newMName').value.trim();
      const mArea = document.getElementById('newMArea').value.trim();
      if (!mName || !mArea) return toast('يرجى تعبئة بيانات المسجد الجديد');
      newMosque = { name: mName, area: mArea };
    } else if (mSelect) {
      mosqueId = Number(mSelect);
    } else {
      return toast('يرجى اختيار مسجد أو إضافة مسجد جديد');
    }
  }
  
  if (!fullName || !phone || !email) return toast('يرجى ملء جميع الحقول المطلوبة');
  
  try {
    await api('/api/users', {
      method: 'POST',
      body: JSON.stringify({ fullName, phone, email, role, mosqueId, newMosque })
    });
    closeSheet();
    toast('تم إنشاء الحساب بنجاح ✓');
    render();
  } catch (e) {
    toast(e.message);
  }
}

  document.getElementById('ov').classList.add('show');
  document.getElementById('sheet').innerHTML=`<div class="grip"></div><h2>رفع غرض فائض</h2>
    <p class="lead">صوّر الغرض الذي لا يحتاجه مسجدك. لن يُنقل لأي مسجد إلا بعد موافقة الوزارة.</p>
    <div class="field"><div class="photobox" id="pbox" onclick="document.getElementById('file').click()">
      <span class="em">📷</span>اضغط لالتقاط صورة الغرض</div>
      <input type="file" id="file" accept="image/*" capture="environment" class="hide" onchange="onPhoto(event)"></div>
    <div class="field"><label>اسم الغرض</label><input id="iname" placeholder="مثال: مكيّف، سجاد، كراسي"></div>
    <div class="field"><label>الفئة</label><div class="chips" id="chips">${CATS.map(c=>`<span class="chip" onclick="pickCat('${c}',this)">${emo(c)} ${c}</span>`).join('')}</div></div>
    <div class="field"><label>الكمية</label><input id="iqty" placeholder="مثال: 1 ، 25 ، 40م²"></div>
    <div class="field"><label>وصف الحالة</label><textarea id="idesc" placeholder="حالة الغرض وسبب الاستغناء عنه"></textarea></div>
    <div class="act"><button class="btn btn-grey" onclick="closeSheet()">إلغاء</button>
    <button class="btn btn-pri" onclick="saveItem()">رفع الغرض</button></div>`;
}
function onPhoto(e){
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{addPhoto=rd.result;const b=document.getElementById('pbox');
    b.style.backgroundImage=`url('${addPhoto}')`;b.innerHTML='<span style="background:rgba(8,80,58,0.75);color:#fff;padding:4px 10px;border-radius:8px;font-size:11px">تم التقاط الصورة ✓ — اضغط للتغيير</span>';};
  rd.readAsDataURL(f);
}
function pickCat(c,el){addCat=c;document.querySelectorAll('#chips .chip').forEach(x=>x.classList.remove('on'));el.classList.add('on')}
async function saveItem(){
  const name=document.getElementById('iname').value.trim();
  const quantity=document.getElementById('iqty').value.trim()||'1';
  const description=document.getElementById('idesc').value.trim();
  if(!addPhoto)return toast('يرجى التقاط صورة');
  if(!name)return toast('أدخل اسم الغرض');
  if(!addCat)return toast('اختر الفئة');
  try{
    await api('/api/items',{method:'POST',body:JSON.stringify({name,category:addCat,quantity,description,photo:addPhoto})});
    closeSheet();tab='mine';renderNav();toast('تم رفع الغرض بنجاح ✓');render();
  }catch(e){toast(e.message)}
}

function closeSheet(){document.getElementById('ov').classList.remove('show')}
let tt;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2800)}

/* بدء */
if(token&&user) {
  enterApp();
} else {
  showSplash();
}
</script>
</body>
</html>
